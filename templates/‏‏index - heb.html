<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חיזוי דירוג סרטים</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 400px; text-align: right; }
        input, select, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #2c3e50; color: white; border: none; cursor: pointer; }
        #suggestionBox { font-weight: bold; min-height: 50px; margin-top: 10px; }
        .dropdown-wrapper { position: relative; width: 100%; margin-bottom: 10px; }
        .container-box { border: 1px solid #ddd; padding: 8px; border-radius: 8px; background: white; cursor: text; min-height: 45px; }
        #selectedTags, #selectedDirectors { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
        .tag { background: #e0e0e0; padding: 3px 8px; border-radius: 5px; font-size: 13px; display: flex; align-items: center; }
        .remove-tag { margin-right: 8px; cursor: pointer; color: red; font-weight: bold; }
        #genreList, #directorList { display: none; position: absolute; top: 100%; right: 0; width: 100%; background: white; border: 1px solid #ddd; border-radius: 8px; max-height: 150px; overflow-y: auto; z-index: 1000; padding: 5px; }
        .genre-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .genre-item:hover { background-color: #f0f0f0; }
    </style>
</head>

<body>
<div class="card">
    <h1>חיזוי דירוג סרט</h1>

    <label>שם סרט:</label>
    <input type="text" id="movieSearch" placeholder="הקלד שם סרט..." onblur="checkMovieMatch()">
    <div id="suggestionBox"></div>

    <label>שנת יציאה:</label>
    <select id="yearSelect"></select>

    <label>אורך (דקות):</label>
    <input type="number" id="runtimeMinutes" placeholder="הקלד אורך סרט בדקות...">

    <label>ז'אנרים:</label>
    <div class="dropdown-wrapper">
        <div id="genreContainer" class="container-box" onclick="document.getElementById('genreSearch').focus(); document.getElementById('genreList').style.display='block'">
            <div id="selectedTags"></div>
            <input type="text" id="genreSearch" placeholder="בחרי ז'אנרים..." onkeyup="filterGenres()">
        </div>
        <div id="genreList" class="list-box">
            <div class="genre-item" onclick="toggleOther()"><strong>+ אחר (הוסיפי ז'אנר)</strong></div>
            <input type="text" id="otherGenreInput" placeholder="כתבי ז'אנר חדש..." style="display: none; width: 90%; margin: 5px;" onblur="addOtherGenre()">
            <div id="genreOptions"></div>
        </div>
    </div>

    <label>במאים:</label>
    <div class="dropdown-wrapper">
        <div id="directorContainer" class="container-box" onclick="document.getElementById('directorSearch').focus(); document.getElementById('directorList').style.display='block'">
            <div id="selectedDirectors"></div>
            <input type="text" id="directorSearch" placeholder="חפשי במאי..." oninput="filterDirectors()">
        </div>
        <div id="directorList" class="list-box">
            <div class="genre-item" onclick="toggleDirectorInput()"><strong>+ אחר (הוסיפי במאי)</strong></div>
            <input type="text" id="otherDirectorInput" placeholder="כתבי שם במאי..." style="display: none; width: 90%; margin: 5px;" onblur="addCustomDirector()">
            <div id="directorOptions"></div>
        </div>
    </div>

    <button onclick="predict()">Predict</button>
    <h2 id="result"></h2>
</div>

<script>
let selectedTconst = null, selectedGenres = [], selectedDirectorIds = [];
let allGenres = [], allDirectors = [];
let debounceTimer;

document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown-wrapper')) {
        document.getElementById('genreList').style.display = 'none';
        document.getElementById('directorList').style.display = 'none';
    }
});

const yearSelect = document.getElementById('yearSelect');
for (let i = 2026; i >= 1890; i--) yearSelect.innerHTML += `<option value="${i}">${i}</option>`;

fetch('/get_genres').then(r => r.json()).then(g => { allGenres = g; renderGenres(g); });
fetch('/get_directors').then(r => r.json()).then(d => { allDirectors = d; });

/* ---------- סרטים (FIXED) ---------- */

function checkMovieMatch() {
    console.log("checkMovieMatch called");
    const movieName = document.getElementById('movieSearch').value;
    if (!movieName) return;

    fetch('/check_movie', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({movie_name: movieName})
    })
    .then(r => r.json())
    .then(res => {

        if (res.status === "need_confirmation") {

            document.getElementById('suggestionBox').innerHTML =
                "האם התכוונת ל: " +
                res.options.map(o =>
                    `<button onclick="selectMovie('${o.name}', ${o.year}, '${o.tconst}')">${o.name} (${o.year})</button>`
                ).join("") +

                `<br><button onclick='continueWithCustom(${JSON.stringify(movieName)})'>להמשיך עם: ${movieName}</button>`;

        } else {

            document.getElementById('suggestionBox').innerHTML =
                `<button onclick='continueWithCustom(${JSON.stringify(movieName)})'>להמשיך עם: ${movieName}</button>`;
        }
    });
}

function selectMovie(name, year, tconst) {
    document.getElementById('movieSearch').value = name;
    document.getElementById('yearSelect').value = year;
    selectedTconst = tconst;
    document.getElementById('suggestionBox').innerHTML =
        `<span style="color: green;">✔ נבחר: ${name} (${year})</span>`;
}

function continueWithCustom(name) {
    document.getElementById('movieSearch').value = name;
    selectedTconst = 'tt_dummy';
    document.getElementById('suggestionBox').innerHTML =
        `<span style="color: orange;">✔ ממשיך עם: ${name}</span>`;
}

/* ---------- סוף שינוי ---------- */

// שאר הקוד ללא שינוי...

function renderGenres(genres) { document.getElementById('genreOptions').innerHTML = genres.map(g => `<div class="genre-item" onclick="addGenre('${g}')">${g}</div>`).join(''); }
function filterGenres() { const term = document.getElementById('genreSearch').value.toLowerCase(); renderGenres(allGenres.filter(g => g.toLowerCase().includes(term))); }
function addGenre(g) { selectedGenres.push(g); renderTags(); document.getElementById('genreList').style.display = 'none'; }
function renderTags() { document.getElementById('selectedTags').innerHTML = selectedGenres.map(g => `<span class="tag">${g} <span class="remove-tag" onclick="removeGenre('${g}')">&times;</span></span>`).join(''); }
function removeGenre(g) { selectedGenres = selectedGenres.filter(x => x !== g); renderTags(); }
function toggleOther() { document.getElementById('otherGenreInput').style.display = 'block'; document.getElementById('otherGenreInput').focus(); }
function addOtherGenre() { const val = document.getElementById('otherGenreInput').value; if(val) addGenre(val); document.getElementById('otherGenreInput').style.display = 'none'; }

function toggleDirectorInput() { document.getElementById('otherDirectorInput').style.display = 'block'; document.getElementById('otherDirectorInput').focus(); }
function addCustomDirector() {
    const input = document.getElementById('otherDirectorInput');
    const name = input.value.trim();
    if (name) {
        const id = 'custom_' + name.replace(/\s+/g, '_');
        if (!allDirectors.find(d => d.id === id)) allDirectors.push({ id, name });
        addDirector(id, name);
    }
    input.value = ''; input.style.display = 'none';
}
function renderDirectors(dirs) {
    document.getElementById('directorOptions').innerHTML = dirs.slice(0, 20).map(d =>
        `<div class="genre-item" onclick="addDirector('${d.id}', '${d.name}')">${d.name}</div>`).join('');
}
function filterDirectors() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        const term = document.getElementById('directorSearch').value.toLowerCase();
        if (term === "") { document.getElementById('directorOptions').innerHTML = ""; return; }
        const filtered = allDirectors.filter(d => d.name && d.name.toLowerCase().indexOf(term) !== -1);
        renderDirectors(filtered);
        document.getElementById('directorList').style.display = 'block';
    }, 50);
}
function addDirector(id, name) {
    if (!selectedDirectorIds.find(d => d.id === id)) {
        selectedDirectorIds.push({id, name});
        document.getElementById('selectedDirectors').innerHTML += `<span class="tag">${name} <span class="remove-tag" onclick="removeDirector('${id}')">&times;</span></span>`;
    }
    document.getElementById('directorSearch').value = '';
    document.getElementById('directorList').style.display = 'none';
}
function removeDirector(id) {
    selectedDirectorIds = selectedDirectorIds.filter(x => x.id !== id);
    document.getElementById('selectedDirectors').innerHTML = selectedDirectorIds.map(d => `<span class="tag">${d.name} <span class="remove-tag" onclick="removeDirector('${d.id}')">&times;</span></span>`).join('');
}

function predict() {
    if (!selectedTconst) { alert("יש לבחור סרט!"); return; }
    fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            tconst: selectedTconst,
            startYear: document.getElementById('yearSelect').value,
            runtimeMinutes: document.getElementById('runtimeMinutes').value,
            genres: selectedGenres.join(','),
            directors: selectedDirectorIds.map(d=>d.id).join(',')
        })
    })
    .then(r => r.json())
    .then(res => document.getElementById('result').innerText =
        res.predicted_rating ? "הדירוג: " + res.predicted_rating.toFixed(3) : "שגיאה!");

}

</script>
</body>
</html>
